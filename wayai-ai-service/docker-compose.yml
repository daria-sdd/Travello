version: '3.9'

# ============================================================
# WayAI — полная локальная инфраструктура
# Kotlin backend (порт 8080) + Python AI service (порт 8081)
# ============================================================

services:

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: wayai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       wayai
      POSTGRES_USER:     wayai
      POSTGRES_PASSWORD: wayai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: wayai-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Kafka ----
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: wayai-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: wayai-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wayai-kafka-ui
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:             local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ---- Kotlin Backend ----
  backend:
    build: ./wayai-backend
    container_name: wayai-backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL:              jdbc:postgresql://postgres:5432/wayai
      DATABASE_USER:             wayai
      DATABASE_PASSWORD:         wayai
      REDIS_HOST:                redis
      KAFKA_BOOTSTRAP_SERVERS:   kafka:29092
      ANTHROPIC_API_KEY:         ${ANTHROPIC_API_KEY}
      FIREBASE_CREDENTIALS_PATH: /secrets/firebase.json
      FIREBASE_WEB_API_KEY:      ${FIREBASE_WEB_API_KEY}
      AMADEUS_CLIENT_ID:         ${AMADEUS_CLIENT_ID}
      AMADEUS_CLIENT_SECRET:     ${AMADEUS_CLIENT_SECRET}
      GOOGLE_PLACES_API_KEY:     ${GOOGLE_PLACES_API_KEY}
      GOOGLE_MAPS_API_KEY:       ${GOOGLE_MAPS_API_KEY}
      OPENWEATHER_API_KEY:       ${OPENWEATHER_API_KEY}
      AI_SERVICE_URL:            http://ai-service:8081
    volumes:
      - ./secrets/firebase.json:/secrets/firebase.json:ro

  # ---- Python AI Service ----
  ai-service:
    build: ./wayai-ai-service
    container_name: wayai-ai-service
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8081:8081"
    environment:
      ANTHROPIC_API_KEY:       ${ANTHROPIC_API_KEY}
      DATABASE_URL:            postgresql+asyncpg://wayai:wayai@postgres:5432/wayai
      REDIS_URL:               redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AMADEUS_CLIENT_ID:       ${AMADEUS_CLIENT_ID}
      AMADEUS_CLIENT_SECRET:   ${AMADEUS_CLIENT_SECRET}
      GOOGLE_PLACES_API_KEY:   ${GOOGLE_PLACES_API_KEY}
      GOOGLE_MAPS_API_KEY:     ${GOOGLE_MAPS_API_KEY}
      OPENWEATHER_API_KEY:     ${OPENWEATHER_API_KEY}
      # LangSmith (опционально)
      LANGCHAIN_API_KEY:       ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2:    ${LANGCHAIN_TRACING_V2:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

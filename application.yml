spring:
  application:
    name: wayai-backend

  # ---- DataSource (PostgreSQL via HikariCP) ----
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/wayai}
    username: ${DATABASE_USER:wayai}
    password: ${DATABASE_PASSWORD:wayai}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---- Flyway migrations ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Kafka ----
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: wayai-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.wayai.*"

  # ---- Redis ----
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ---- Application secrets ----
wayai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-20250514
    max-tokens: 8192

  amadeus:
    client-id: ${AMADEUS_CLIENT_ID}
    client-secret: ${AMADEUS_CLIENT_SECRET}
    base-url: https://api.amadeus.com

  google:
    places-api-key: ${GOOGLE_PLACES_API_KEY}
    maps-api-key: ${GOOGLE_MAPS_API_KEY}

  openweather:
    api-key: ${OPENWEATHER_API_KEY}

  firebase:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-adminsdk.json}

  aws:
    region: ${AWS_REGION:eu-central-1}
    bucket-name: ${AWS_S3_BUCKET:wayai-assets}

  # Kafka topic names (centralized)
  kafka:
    topics:
      route-generation: route-generation-requests
      notification-send: notification-send-requests

# ---- Server ----
server:
  port: ${PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/event-stream

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

# ---- Logging ----
logging:
  level:
    com.wayai: DEBUG
    org.springframework.kafka: WARN
    org.springframework.security: WARN
    dev.langchain4j: DEBUG
